name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  desktop-swift:
    name: Desktop Swift (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
          - os: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Select Xcode 26.6
        if: runner.os == 'macOS'
        run: sudo xcode-select -s /Applications/Xcode_26.6.app

      - name: Install Swift toolchain (macOS/Linux)
        if: runner.os != 'Windows'
        uses: SwiftyLab/setup-swift@38f54a76b70d989321de9dc7c840618c08cf56e9 # v1.14.0
        with:
          swift-version: '6.3.3'

      - name: Build
        run: swift build --build-tests

      - name: Test
        run: swift test

  apple-simulators:
    name: Apple Platforms (${{ matrix.platform }})
    runs-on: macos-26
    needs: desktop-swift
    strategy:
      fail-fast: false
      matrix:
        platform:
          - "iOS Simulator"
          - "tvOS Simulator"
          - "watchOS Simulator"
          - "visionOS Simulator"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select Xcode 26.6
        run: sudo xcode-select -s /Applications/Xcode_26.6.app
      - name: Build for ${{ matrix.platform }}
        run: |
          xcodebuild \
            -scheme Commander \
            -destination "generic/platform=${{ matrix.platform }}" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            build
